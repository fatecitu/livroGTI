<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha estante virtual</title>
    <!-- Importação da biblioteca Sweet Alert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- CSS -->
    <link href="css/estilo.css" rel="stylesheet"> 
   <!-- Fonte Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>  
    <div class="app-container">
        <h1>📚Minha estante virtual</h1>
        <div class="search-box">
            <input type="text" id="isbn" placeholder="Digite o ISBN" required>
    <button onclick="buscarLivro()">Buscar Livro</button>
        </div>
        <div id="preview-container"></div>
        <hr> <!-- cria uma linha -->

        <h2>Meus Favoritos</h2>
        <table id="books-table" border="1">
            <thead>
                <tr>
                    <th>Capa</th>
                    <th>Título</th>
                    <th>ISBN</th>
                    <th>Páginas</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
